<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYRA Login Simulation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--color-bg);
        }
        .login-card {
            background-color: var(--color-secondary);
            padding: 40px;
            border-radius: 24px;
            width: 400px;
            border: 1px solid var(--color-border);
            text-align: center;
        }
        .login-logo {
            font-size: 48px;
            font-weight: bold;
            color: var(--color-primary);
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-white2);
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            height: 48px;
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            color: var(--color-white);
            padding: 0 15px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            height: 48px;
            background-color: var(--color-primary);
            color: var(--color-bg);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">SAYRA</div>
            <div class="input-group">
                <label>نام کاربری</label>
                <input type="text" placeholder="نام کاربری خود را وارد کنید">
            </div>
            <div class="input-group">
                <label>رمز عبور</label>
                <input type="password" placeholder="********">
            </div>
            <button class="login-btn" onclick="location.href='index.html'">ورود به سیستم</button>
        </div>
    </div>
</body>
</html>
