version: "1.1.0"
description: >
  This file documents all application events published and subscribed to by the SAYRA Client
  subsystems (Authentication, Launcher, Telemetry, and Sync). It provides payload schemas,
  reliability semantics, retry parameters, and failure behaviors for server developers.

client_published_events:
  - name: "AuthenticationStarted"
    publisher: "AuthenticationService"
    subscriber: "App.xaml.cs, LoginViewModel"
    trigger: "Fires immediately when player credentials or dynamic codes are submitted for authentication."
    payload_schema:
      username: "string (Gamer account handle)"
      timestamp: "string (ISO 8601 UTC)"
    reliability: "Best Effort"
    ordering: "Sequential"
    retry: "None"
    persistence: "Ephemeral"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Stops event propagation and logs audit trace."

  - name: "AuthenticationSucceeded"
    publisher: "AuthenticationService"
    subscriber: "App.xaml.cs, SessionManager, ClientStateManager"
    trigger: "Fires upon successful login of gamer or administrator bypass."
    payload_schema:
      user:
        id: "string"
        username: "string"
        displayName: "string"
        role: "string (Player, Admin, Operator)"
        permissions: "array of strings"
        avatar: "string (nullable)"
        lastLogin: "string (ISO 8601 UTC, nullable)"
        preferredLanguage: "string"
        preferredTheme: "string"
        stationId: "string (nullable)"
      authenticationType: "string (LocalAdmin, ServerReservation, Offline, Cached, Server)"
      sessionId: "string (Assigned unique player session identifier)"
      timestamp: "string (ISO 8601 UTC)"
    reliability: "Guaranteed Delivery"
    ordering: "Strictly Ordered"
    retry: "Unlimited local retries to persist state"
    persistence: "Persisted to session_state.json locally"
    version: "1.1.0"
    expected_response: "None"
    failure_behavior: "Triggers immediate emergency workstation lock."

  - name: "AuthenticationFailed"
    publisher: "AuthenticationService"
    subscriber: "LoginViewModel, UI Overlay"
    trigger: "Fires when credential comparison or dynamic challenge validation fails."
    payload_schema:
      username: "string"
      reason: "string (Failure description)"
      timestamp: "string (ISO 8601 UTC)"
    reliability: "Best Effort"
    ordering: "Sequential"
    retry: "None"
    persistence: "Ephemeral"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Resets UI states to enable user retry."

  - name: "LogoutStarted"
    publisher: "AuthenticationService"
    subscriber: "App.xaml.cs, SessionManager, KioskManager"
    trigger: "Fires when user initiates logout or session duration limit expires."
    payload_schema:
      user:
        username: "string"
        role: "string"
      timestamp: "string (ISO 8601 UTC)"
    reliability: "Guaranteed Delivery"
    ordering: "Strictly Ordered"
    retry: "Retry until local state changes persist"
    persistence: "Persisted to session_state.json state reset"
    version: "1.1.0"
    expected_response: "None"
    failure_behavior: "Forces abrupt shutdown of active game processes and locks terminal registry."

  - name: "LogoutCompleted"
    publisher: "AuthenticationService"
    subscriber: "LoginViewModel, UI transition"
    trigger: "Fires when logout steps, including process cleanup and registry locking, are finalized."
    payload_schema:
      username: "string (nullable)"
      timestamp: "string (ISO 8601 UTC)"
    reliability: "Best Effort"
    ordering: "Sequential"
    retry: "None"
    persistence: "Ephemeral"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Logs audit error."

  - name: "SessionExpired"
    publisher: "AuthenticationService"
    subscriber: "App.xaml.cs, SessionManager"
    trigger: "Fires when active countdown session expires due to credit depletion."
    payload_schema:
      sessionId: "string"
      username: "string (nullable)"
      timestamp: "string (ISO 8601 UTC)"
    reliability: "Guaranteed Delivery"
    ordering: "Strictly Ordered"
    retry: "Immediate execution"
    persistence: "Ephemeral (Triggers state transitions)"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Invokes immediate Kiosk lockout sequence."

  - name: "GameLaunching"
    publisher: "GameLauncherService"
    subscriber: "GameLibraryViewModel, GameDetailViewModel"
    trigger: "Fires immediately prior to starting game executable process."
    payload_schema:
      gameId: "string"
      name: "string (Human-readable name)"
    reliability: "Best Effort"
    ordering: "Sequential"
    retry: "None"
    persistence: "Ephemeral"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Transitions status badge back to Playable."

  - name: "GameStarted"
    publisher: "GameLauncherService"
    subscriber: "GameLibraryViewModel, GameDetailViewModel, SessionManager"
    trigger: "Fires when the OS process is spawned and the process handle is captured."
    payload_schema:
      pid: "integer"
      gameId: "string"
      name: "string"
    reliability: "Guaranteed"
    ordering: "Strictly Ordered"
    retry: "Fires locally and sends PROCESS_LAUNCHED TCP packet"
    persistence: "Memory"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Closes handles and fires LaunchFailed."

  - name: "GameExited"
    publisher: "GameLauncherService"
    subscriber: "GameLibraryViewModel, GameDetailViewModel, SessionManager"
    trigger: "Fires when the game process terminates normally (ExitCode 0)."
    payload_schema:
      gameId: "string"
      name: "string"
      exitCode: "integer"
      duration: "string (Duration TimeSpan representation, e.g. '01:30:00')"
    reliability: "Guaranteed"
    ordering: "Strictly Ordered"
    retry: "Fires locally and sends PROCESS_EXITED TCP packet"
    persistence: "Memory"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Logs process telemetry error."

  - name: "GameCrashed"
    publisher: "GameLauncherService"
    subscriber: "GameLibraryViewModel, GameDetailViewModel, RecoveryManager"
    trigger: "Fires when the game process terminates with a non-zero exit code or is closed abruptly."
    payload_schema:
      gameId: "string"
      name: "string"
      exitCode: "integer"
      reason: "string"
    reliability: "Guaranteed"
    ordering: "Strictly Ordered"
    retry: "Launcher automatic recovery retry loop (max 3 retries)"
    persistence: "Memory"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Displays crash overlay notification and restarts game or returns to library status."

  - name: "LaunchFailed"
    publisher: "GameLauncherService"
    subscriber: "GameLibraryViewModel, GameDetailViewModel"
    trigger: "Fires when executable can not be opened, paths are missing, or permission is denied."
    payload_schema:
      gameId: "string"
      name: "string"
      reason: "string"
    reliability: "Best Effort"
    ordering: "Sequential"
    retry: "None"
    persistence: "Ephemeral"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Prompts warning message to user."

server_published_events:
  - name: "SECURITY_BREACH_DETECTED"
    publisher: "Server (TCP Command / Detection)"
    subscriber: "SayraClient WatchdogService"
    trigger: "Fires when server identifies system file tampering, invalid license parameters, or local administrator bypass breaches."
    payload_schema:
      severity: "string (High, Medium, Low)"
      description: "string"
      details: "string (nullable)"
    reliability: "Guaranteed Delivery"
    ordering: "Strictly Ordered"
    retry: "Resend until acknowledged"
    persistence: "Logged permanently"
    version: "1.0.0"
    expected_response: "None (Client locks shell immediately)"
    failure_behavior: "Hard terminate workstation processes."

  - name: "BILLING_UPDATE"
    publisher: "Server (TCP Billing Synchronization)"
    subscriber: "SessionManager, SessionHeroViewModel"
    trigger: "Fires when administrator adjusts billing parameters or credits are added/removed from server side."
    payload_schema:
      sessionId: "string"
      ratePerHour: "number"
      remainingCredits: "number"
    reliability: "Guaranteed Delivery"
    ordering: "Sequential"
    retry: "Resend every 5 seconds until acknowledged"
    persistence: "Persisted to session_state.json"
    version: "1.0.0"
    expected_response: "None"
    failure_behavior: "Falls back to cached billing rate calculations."
